<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Produk Pilihan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{

background:#ee4d2d;
padding:10px;
position:sticky;
top:0;
z-index:1000;

}

.logo{

color:white;
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:10px;

}

.search{

width:100%;
padding:12px;
border:none;
border-radius:6px;
outline:none;

}

.container{

padding:10px;
max-width:1200px;
margin:auto;

}

.grid{

display:grid;

/* HP: 2 kolom */
grid-template-columns:
repeat(2,1fr);

gap:8px;

}

/* Desktop */
@media(min-width:768px){

.grid{

grid-template-columns:
repeat(5,1fr);

}

}

.card{

background:white;
border-radius:8px;
overflow:hidden;

box-shadow:
0 2px 6px rgba(0,0,0,.08);

transition:.2s;

}

.card:hover{

transform:translateY(-2px);

}

.image{

width:100%;
aspect-ratio:1/1;
object-fit:cover;
background:#eee;

}

.content{

padding:8px;

}

.nama{

font-size:13px;
line-height:1.4;
height:36px;

overflow:hidden;

margin-bottom:8px;

}

.btn{

display:block;
width:100%;

background:#ee4d2d;

color:white;
text-decoration:none;

padding:8px;

text-align:center;

border-radius:4px;

font-size:12px;
font-weight:bold;

}

.loading{

padding:30px;
text-align:center;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

🛒 Produk Pilihan

</div>

<input
id="search"
class="search"
placeholder="Cari produk..."
>

</div>

<div class="container">

<div
class="grid"
id="list">

<div class="loading">
Memuat produk...
</div>

</div>

</div>

<script>

const spreadsheetId=
"1Ax-h56qMf8ahbz2ji9K57f47Kb0p80CiQv3ZDEk8m6Y";

const gid="0";

const url=
`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

let products=[];


async function getImage(link){

try{

const proxy=
`https://api.allorigins.win/raw?url=${encodeURIComponent(link)}`;

const res=
await fetch(proxy);

const html=
await res.text();

const match=
html.match(
/property="og:image".*?content="(.*?)"/
);

return match?.[1] ||
"https://placehold.co/300x300?text=Produk";

}catch{

return "https://placehold.co/300x300?text=Produk";

}

}


async function loadData(){

try{

const response=
await fetch(url);

const text=
await response.text();

const json=
JSON.parse(
text.substr(47).slice(0,-2)
);

const rows=
json.table.rows;

products=
rows.map(row=>({

nama:row.c[1]?.v || "",

link:row.c[2]?.v || "",

img:""

}));


for(let item of products){

item.img=
await getImage(item.link);

render(products);

}

}catch(e){

document.getElementById(
"list"
).innerHTML=
"Gagal memuat data";

}

}


function render(data){

let html="";

data.forEach(item=>{

html+=`

<div class="card">

<img
class="image"
src="${item.img}"
loading="lazy"
>

<div class="content">

<div class="nama">

${item.nama}

</div>

<a
class="btn"
target="_blank"
href="${item.link}">

Lihat

</a>

</div>

</div>

`;

});

document.getElementById(
"list"
).innerHTML=html;

}


document
.getElementById("search")
.addEventListener(
"input",
function(){

const keyword=
this.value.toLowerCase();

const filtered=
products.filter(item=>

item.nama
.toLowerCase()
.includes(keyword)

);

render(filtered);

}

);

loadData();

</script>

</body>
</html>
