
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Produk Pilihan</title>

<!-- Fav Icon Shopee -->
<link rel="icon"
href="https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/icon_favicon_1_32.0Wecxv.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* Header */

.header{
background:#ee4d2d;
padding:10px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.logo{
color:white;
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:6px;
outline:none;
}

.container{
max-width:1200px;
margin:auto;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

@media(min-width:768px){
.grid{
grid-template-columns:repeat(5,1fr);
}
}

.card{
position:relative;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ee4d2d;
color:white;
padding:4px 8px;
font-size:12px;
font-weight:bold;
border-radius:20px;
z-index:10;
}

.image{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
background:#eee;
}

.content{
padding:8px;
}

.nama{
font-size:13px;
line-height:1.4;
height:36px;
overflow:hidden;
margin-bottom:8px;
}

.btn{
display:block;
width:100%;
background:#ee4d2d;
color:white;
padding:8px;
border-radius:5px;
text-align:center;
text-decoration:none;
font-size:12px;
font-weight:bold;
}

/* Loading */

.loading-wrap{
display:flex;
justify-content:center;
align-items:center;
height:250px;
flex-direction:column;
gap:15px;
}

.spinner{

width:45px;
height:45px;

border:5px solid #ffd2c8;
border-top:5px solid #ee4d2d;

border-radius:50%;

animation:spin .8s linear infinite;

}

.loading-text{
color:#666;
font-size:14px;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

</style>
</head>

<body>

<div class="header">

<div class="logo">

🛒 Produk Pilihan

</div>

<input
id="search"
class="search"
placeholder="Cari produk..."
>

</div>

<div class="container">

<div
class="grid"
id="list">

<div class="loading-wrap">

<div class="spinner"></div>

<div class="loading-text">

Memuat produk...

</div>

</div>

</div>

<script>

const spreadsheetId=
"1Ax-h56qMf8ahbz2ji9K57f47Kb0p80CiQv3ZDEk8m6Y";

const gid="0";

const url=
`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

let products=[];

async function loadData(){

try{

const response=
await fetch(url);

const text=
await response.text();

const json=
JSON.parse(
text.substr(47).slice(0,-2)
);

const rows=
json.table.rows;

products=
rows.map(row=>({

no:row.c[0]?.v || "",

nama:row.c[1]?.v || "",

link:row.c[2]?.v || "",

gambar:row.c[3]?.v || 
"https://placehold.co/300x300?text=No+Image"

}));

render(products);

}catch(err){

document.getElementById(
"list"
).innerHTML=
"Gagal memuat data";

}

}

function render(data){

let html="";

data.forEach(item=>{

html+=`

<div class="card">

<div class="badge">

#${item.no}

</div>

<img
class="image"
src="${item.gambar}"
loading="lazy"
>

<div class="content">

<div class="nama">

${item.nama}

</div>

<a
class="btn"
href="${item.link}"
target="_blank"
>

Lihat Produk

</a>

</div>

</div>

`;

});

document.getElementById(
"list"
).innerHTML=html;

}


document
.getElementById(
"search"
)
.addEventListener(
"input",
function(){

const keyword=
this.value.toLowerCase();

const filtered=
products.filter(item=>

item.nama
.toLowerCase()
.includes(keyword)

);

render(filtered);

}
);

loadData();

</script>

</body>
</html>
