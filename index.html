```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produk Rekomendasi Shopee</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* Header */

.header{

background:#ee4d2d;
padding:15px;
position:sticky;
top:0;
z-index:1000;

box-shadow:
0 2px 8px rgba(0,0,0,.15);

}

.logo{

color:white;
font-size:28px;
font-weight:bold;

text-align:center;

}

.search-container{

margin-top:15px;

display:flex;
justify-content:center;

}

.search{

width:100%;
max-width:700px;

padding:14px;

border:none;
border-radius:6px;

font-size:16px;

outline:none;

}

/* Container */

.container{

max-width:1200px;
margin:auto;
padding:20px;

}

/* Product Grid */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:18px;

}

/* Product Card */

.card{

background:white;

border-radius:8px;

overflow:hidden;

transition:.3s;

cursor:pointer;

}

.card:hover{

transform:translateY(-5px);

box-shadow:
0 8px 25px rgba(0,0,0,.15);

}

.image{

height:180px;

background:
linear-gradient(
135deg,
#ff7b54,
#ee4d2d
);

display:flex;

align-items:center;

justify-content:center;

font-size:60px;

color:white;

}

.content{

padding:15px;

}

.nama{

font-size:15px;

height:45px;

overflow:hidden;

margin-bottom:12px;

line-height:1.4;

}

.btn{

display:block;

text-align:center;

padding:10px;

background:#ee4d2d;

color:white;

text-decoration:none;

border-radius:4px;

font-size:14px;

font-weight:bold;

}

.btn:hover{

background:#d73211;

}

/* Footer */

.footer{

text-align:center;
padding:25px;
color:#888;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

🛒 Produk Pilihan

</div>

<div class="search-container">

<input
type="text"
class="search"
id="search"
placeholder="Cari produk..."
>

</div>

</div>

<div class="container">

<div
class="grid"
id="list"
>

</div>

</div>

<div class="footer">

Affiliate Product Recommendation

</div>

<script>

const spreadsheetId =
"1Ax-h56qMf8ahbz2ji9K57f47Kb0p80CiQv3ZDEk8m6Y";

const gid="0";

const url=
`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

let products=[];

async function loadData(){

try{

const response=
await fetch(url);

const text=
await response.text();

const json=
JSON.parse(
text.substr(47).slice(0,-2)
);

const rows=
json.table.rows;

products=
rows.map(row=>({

no:row.c[0]?.v || "",
nama:row.c[1]?.v || "",
link:row.c[2]?.v || ""

}));

render(products);

}catch(err){

document.getElementById(
"list"
).innerHTML=
"<h3>Gagal memuat data</h3>";

}

}

function render(data){

let html="";

data.forEach(item=>{

html+=`

<div class="card">

<div class="image">

🛍️

</div>

<div class="content">

<div class="nama">

${item.nama}

</div>

<a
class="btn"
href="${item.link}"
target="_blank"
>

Lihat Produk

</a>

</div>

</div>

`;

});

document.getElementById(
"list"
).innerHTML=html;

}

document
.getElementById(
"search"
)
.addEventListener(
"input",
function(){

const keyword=
this.value.toLowerCase();

const filtered=
products.filter(item=>

item.nama
.toLowerCase()
.includes(keyword)

);

render(filtered);

}
);

loadData();

</script>

</body>
</html>
```
