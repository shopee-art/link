
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produk Rekomendasi Shopee</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.search{
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.card{

background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;

box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.nama{

font-size:18px;
font-weight:bold;
margin-bottom:10px;

}

.btn{

display:inline-block;

padding:10px 15px;

background:#ee4d2d;

color:white;

text-decoration:none;

border-radius:8px;

}

.btn:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Rekomendasi Produk Shopee</h1>

<input
type="text"
class="search"
id="search"
placeholder="Cari produk..."
>

<div id="list"></div>

</div>

<script>

const spreadsheetId =
"1Ax-h56qMf8ahbz2ji9K57f47Kb0p80CiQv3ZDEk8m6Y";

/*
gid=0 biasanya sheet pertama
ubah jika sheet berbeda
*/

const gid="0";

const url=
`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

let products=[];

async function loadData(){

try{

const response=
await fetch(url);

const text=
await response.text();

const json=
JSON.parse(
text.substr(
47
).slice(
0,-2
)
);

const rows=
json.table.rows;

products=
rows.map(row=>({

no:
row.c[0]?.v || "",

nama:
row.c[1]?.v || "",

link:
row.c[2]?.v || ""

}));

render(products);

}catch(err){

document.getElementById(
"list"
).innerHTML=
"Gagal memuat data";

console.log(err);

}

}

function render(data){

let html="";

data.forEach(item=>{

html+=`

<div class="card">

<div class="nama">

${item.nama}

</div>

<a
class="btn"
href="${item.link}"
target="_blank"
>

Lihat Produk

</a>

</div>

`;

});

document.getElementById(
"list"
).innerHTML=html;

}

document
.getElementById(
"search"
)
.addEventListener(
"input",
function(){

const keyword=
this.value.toLowerCase();

const filtered=
products.filter(item=>

item.nama
.toLowerCase()
.includes(keyword)

);

render(filtered);

}
);

loadData();

</script>

</body>
</html>
